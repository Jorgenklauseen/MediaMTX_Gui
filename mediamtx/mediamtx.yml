api: yes
authMethod: http
authHTTPAddress: http://app:5000/api/streams/authenticate
authHTTPExclude:
  - action: read
  - action: playback
  - action: api
  - action: metrics
  - action: pprof

authInternalUsers:
  - user: any
    pass:
    ips: []
    permissions:
      - action: publish
      - action: read
      - action: playback
      - action: api

rtmpAddress: :1936

pathDefaults:
  runOnReady: curl -X POST "http://app:5000/api/streams/started?name=$MTX_PATH"
  runOnNotReady: curl -X POST "http://app:5000/api/streams/stopped?name=$MTX_PATH"

paths:
  all_others:
