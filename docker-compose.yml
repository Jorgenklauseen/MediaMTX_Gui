services:
  app:
    image: jorgenklausen/mediamtx_bachelor:latest
    restart: unless-stopped
    labels:
      - com.centurylinklabs.watchtower.enable=true
    expose:
      - "5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5000
      - ConnectionStrings__DefaultConnection=Data Source=/data/app.db
      - Oidc__Authority=https://thurs.uia.no:4444
      - Oidc__ClientId=${OIDC_CLIENT_ID}
      - Oidc__ClientSecret=${OIDC_CLIENT_SECRET}
      - MediaMtx__RtmpBaseUrl=rtmp://ikt302-g25.internal.uia.no:1935
      - MediaMtx__RtspBaseUrl=rtsp://ikt302-g25.internal.uia.no:8554
      - MediaMtx__HlsBaseUrl=https://ikt302-g25.internal.uia.no/hls
      - MediaMtx__SrtBaseUrl=srt://ikt302-g25.internal.uia.no:8890
      - MediaMtx__WebRtcBaseUrl=https://ikt302-g25.internal.uia.no/webrtc
    volumes:
      - app-data:/data
      - ../data/recordings:/recordings
    networks:
      - internal

  mediamtx:
    build:
      context: .
      dockerfile: dockerfile.mediamtx
    restart: unless-stopped
    labels:
      - com.centurylinklabs.watchtower.enable=false
    expose:
      - "8888"   
      - "8889"    
    ports:
      - "1935:1935"   
      - "8189:8189/udp"
      - "8890:8890"  
      - "8554:8554"   
    volumes:
      - ../data/mediamtx/mediamtx.yml:/mediamtx.yml
      - ../data/recordings:/recordings
    networks:
      - internal

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/nginx/sites-available/streaming.conf:/etc/nginx/conf.d/streaming.conf:ro
      - /etc/nginx/certs:/etc/nginx/certs:ro
      - /var/www/errors:/var/www/errors:ro
    depends_on:
      - app
      - mediamtx
    networks:
      - internal

  watchtower:
    image: containrrr/watchtower:1.4.0
    restart: unless-stopped
    environment:
      - DOCKER_API_VERSION=1.44
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 30 --label-enable

volumes:
  app-data:

networks:
  internal:
