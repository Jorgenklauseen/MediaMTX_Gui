services:
  app:
    image: jorgenklausen/mediamtx_bachelor:latest
    restart: unless-stopped
    labels:
      - com.centurylinklabs.watchtower.enable=true
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5000
      - ConnectionStrings__DefaultConnection=Data Source=/data/app.db
      - Oidc__Authority=https://thurs.uia.no:4444
      - Oidc__ClientId=${OIDC_CLIENT_ID}
      - Oidc__ClientSecret=${OIDC_CLIENT_SECRET}
      - MediaMtx__RtmpBaseUrl=rtmp://ikt302-g25.internal.uia.no:1936
      - MediaMtx__RtspBaseUrl=rtsp://ikt302-g25.internal.uia.no:8554
      - MediaMtx__HlsBaseUrl=http://ikt302-g25.internal.uia.no:8888
      - MediaMtx__SrtBaseUrl=srt://ikt302-g25.internal.uia.no:8890
      - MediaMtx__WebRtcBaseUrl=http://ikt302-g25.internal.uia.no:8889
      
    volumes:
      - app-data:/data
      - ../data/recordings:/recordings
    networks:
      - internal

  mediamtx:
    build:
      context: .
      dockerfile: dockerfile.mediamtx
    restart: unless-stopped
    labels:
      - com.centurylinklabs.watchtower.enable=false
    ports:
      - "8888:8888"
      - "8889:8889"
      - "8890:8890"
      - "8554:8554"
      - "1936:1936"
    volumes:
      - ../data/mediamtx/mediamtx.yml:/mediamtx.yml #config file
      - ../data//recordings:/recordings #recordings
    networks:
      - internal
  
  watchtower:
    image: containrrr/watchtower:1.4.0
    restart: unless-stopped
    environment:
      - DOCKER_API_VERSION=1.44
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 30 --label-enable

volumes:
  app-data:

networks:
  internal: